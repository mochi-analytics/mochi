name: mochi-dev

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mochi
      POSTGRES_PASSWORD: mochi
      POSTGRES_DB: mochi
    ports:
      - "5433:5432"
    volumes:
      - mochi-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mochi"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    environment:
      CLICKHOUSE_DB: mochi
      CLICKHOUSE_USER: mochi
      CLICKHOUSE_PASSWORD: mochi
    ports:
      - "8123:8123"
    volumes:
      - mochi-ch:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mochi-pg:
  mochi-ch:
