# Self-host stack: run from the repo root with
#   docker compose -f docker/docker-compose.yml up -d
# Set POSTGRES_PASSWORD and CLICKHOUSE_PASSWORD in your environment or a .env
# file next to this compose file.
name: mochi

services:
  mochi:
    image: ghcr.io/mochi-analytics/mochi:latest
    environment:
      DATABASE_URL: postgres://mochi:${POSTGRES_PASSWORD:-change-me}@postgres:5432/mochi
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: mochi
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-change-me}
      CLICKHOUSE_DB: mochi
      MIGRATE_ON_START: "1"
      RETENTION_CLEANUP: "1"
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mochi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: mochi
    volumes:
      - mochi-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mochi"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    environment:
      CLICKHOUSE_DB: mochi
      CLICKHOUSE_USER: mochi
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-change-me}
    volumes:
      - mochi-ch:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  mochi-pg:
  mochi-ch:
