# Cloud stack for Coolify. Coolify generates the SERVICE_PASSWORD_64_* values
# once and reuses them across services and subsequent deployments.
name: mochi-cloud

services:
  mochi:
    build:
      # Coolify sets the Compose project directory to the repository root.
      context: .
      dockerfile: docker/Dockerfile
    environment:
      MOCHI_CLOUD: "1"
      DATABASE_URL: postgres://mochi:${SERVICE_PASSWORD_64_POSTGRES}@postgres:5432/mochi
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: mochi
      CLICKHOUSE_PASSWORD: ${SERVICE_PASSWORD_64_CLICKHOUSE}
      CLICKHOUSE_DB: mochi
      MIGRATE_ON_START: "1"
      RETENTION_CLEANUP: "1"
      ALERTS: "1"
    ports:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mochi
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_64_POSTGRES}
      POSTGRES_DB: mochi
    volumes:
      - mochi-cloud-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mochi"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    environment:
      CLICKHOUSE_DB: mochi
      CLICKHOUSE_USER: mochi
      CLICKHOUSE_PASSWORD: ${SERVICE_PASSWORD_64_CLICKHOUSE}
    volumes:
      - mochi-cloud-ch:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  mochi-cloud-pg:
  mochi-cloud-ch:
