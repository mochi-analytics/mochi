name: Feature request
description: Suggest an improvement or new capability for Mochi.
title: "feat: "
labels: ["type: feature", "status: needs triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or limitation should this solve?
      placeholder: I want to understand ..., but today ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or workflow you want.
      placeholder: Add a view/API/setting that ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - Ingest API
        - SDK integration
        - Database or retention
        - Sharing or exports
        - Docker or self-hosting
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention workarounds or different designs that were considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, examples, mockups, metrics, or implementation notes.
    validations:
      required: false
